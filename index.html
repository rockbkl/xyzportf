<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Dipuu <> | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(145deg,#0b0d10,#1a1e26);
    font-family:'Segoe UI',Roboto,system-ui, -apple-system, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:12px;
    transition:0.3s ease;
}

/* smoother mobile handling */
html, body {
    overflow-x: hidden;
    width: 100%;
}

/* CARD - fully responsive */
.card{
    max-width:1000px;
    width:100%;
    background:rgba(20,24,30,0.9);
    backdrop-filter:blur(12px);
    border:1px solid rgba(90,140,255,0.25);
    border-radius:32px 32px 28px 28px;
    box-shadow:0 25px 45px -12px rgba(0,0,0,0.85);
    overflow:hidden;
    animation:fadeUp 0.8s ease forwards;
    opacity:0;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(40px);}
    to{opacity:1;transform:translateY(0);}
}

.portfolio{
    display:flex;
    flex-direction:column;
}

@media(min-width:720px){
    .portfolio{
        flex-direction:row;
    }
    .card {
        border-radius:48px 48px 40px 40px;
    }
}

/* IMAGE ZONE */
.image-zone{
    flex:1.1;
    background:#0f1217;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    border-bottom:2px solid #2a3140;
}

@media(min-width:720px){
    .image-zone{
        padding:30px;
        border-bottom:none;
        border-right:2px solid #2a3140;
    }
}

.image-frame{
    width:100%;
    max-width:300px;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 18px 30px -8px #00000080;
    animation:float 4s ease-in-out infinite;
}

@media(min-width:480px){
    .image-frame{
        max-width:360px;
        border-radius:32px;
    }
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

.image-frame img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
}

/* CONTENT ZONE */
.content-zone{
    flex:1.3;
    padding:24px 20px;
    color:#edf2f9;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

@media(min-width:720px){
    .content-zone{
        padding:32px;
    }
}

.name-badge{
    display:flex;
    align-items:baseline;
    gap:6px;
    margin-bottom:16px;
    flex-wrap:wrap;
}

.name{
    font-size:2.2rem;
    font-weight:800;
    background:linear-gradient(130deg,#ffffff,#bdd3ff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    line-height:1.1;
}

@media(min-width:480px){
    .name{
        font-size:2.7rem;
    }
}

.tag-brackets{
    font-size:1.8rem;
    color:#6c8cbf;
}

@media(min-width:480px){
    .tag-brackets{
        font-size:2rem;
    }
}

.hobby-section{
    margin:18px 0;
}

.hobby-title{
    font-size:0.8rem;
    letter-spacing:2px;
    color:#8196b9;
    margin-bottom:14px;
    border-left:5px solid #3f7de0;
    padding-left:12px;
    text-transform:uppercase;
}

.hobby-grid{
    display:flex;
    flex-wrap:wrap;
    gap:12px 12px;
}

.hobby-item{
    background:#1e2636;
    border-radius:40px;
    padding:8px 16px;
    border:1px solid #334153;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.9rem;
    transition:0.3s ease;
    cursor:pointer;
    white-space:nowrap;
    color: #ffffff;
}

@media(min-width:480px){
    .hobby-item{
        padding:10px 20px;
        font-size:1rem;
        gap:10px;
    }
}

.hobby-item i {
    font-size:1rem;
    color: #60a0ff;
}

.hobby-item:hover{
    background:#26334b;
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 0 15px rgba(96,160,255,0.4);
}

.hobby-grid a {
    text-decoration: none;
    color: inherit;
}

/* SPOTIFY PLAYER */
.spotify-player {
    margin-top: 18px;
    margin-bottom: 12px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 18px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(29, 185, 84, 0.2);
    transition: 0.2s;
    width: 100%;
    flex-wrap: wrap;
}

@media(min-width:480px){
    .spotify-player {
        padding: 16px 20px;
        gap: 18px;
        flex-wrap: nowrap;
    }
}

.spotify-cover {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 8px 15px rgba(0,0,0,0.6);
}

@media(min-width:480px){
    .spotify-cover {
        width: 60px;
        height: 60px;
    }
}

.spotify-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.spotify-track-info {
    flex: 1;
    min-width: 120px;
}

.spotify-song-name {
    font-weight: 700;
    font-size: 1.1rem;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}

@media(min-width:480px){
    .spotify-song-name {
        font-size: 1.2rem;
    }
}

.spotify-artist {
    font-size: 0.8rem;
    color: #b3b3b3;
    letter-spacing: 0.3px;
}

.spotify-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-left: auto;
}

@media(min-width:480px){
    .spotify-controls {
        gap: 20px;
    }
}

.spotify-controls i {
    color: #b3b3b3;
    font-size: 1.3rem;
    cursor: pointer;
    transition: 0.15s;
}

.spotify-controls i:hover {
    color: white;
    transform: scale(1.05);
}

.spotify-play-btn {
    background: #1db954;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: black !important;
    font-size: 1.1rem !important;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    flex-shrink: 0;
}

@media(min-width:480px){
    .spotify-play-btn {
        width: 42px;
        height: 42px;
        font-size: 1.2rem !important;
    }
}

.spotify-play-btn i {
    color: black;
    font-size: 1.1rem;
}

.spotify-play-btn i:hover {
    color: black;
}

.spotify-progress {
    margin-top: 6px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    width: 100%;
    position: relative;
}

.spotify-progress-fill {
    width: 45%;
    height: 100%;
    background: #1db954;
    border-radius: 4px;
}

/* Glass Buttons */
.glass-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    width:100%;
    padding:16px 20px;
    font-size:1.3rem;
    font-weight:700;
    color:white;
    border-radius:60px;
    text-decoration:none;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px) saturate(180%);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 10px 30px rgba(0,0,0,0.6),
               inset 0 1px 1px rgba(255,255,255,0.2);
    transition:all 0.3s ease;
    margin-top:14px;
    cursor:pointer;
    white-space: nowrap;
}

@media(min-width:480px){
    .glass-btn{
        padding:20px 30px;
        font-size:1.5rem;
        gap:14px;
    }
}

.glass-btn:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 0 20px rgba(96,160,255,0.5);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition:0.3s ease;
    padding:16px;
}

.modal.active{
    opacity:1;
    visibility:visible;
}

.modal-content{
    transform:scale(0.7);
    transition:0.3s ease;
    max-width:90vw;
}

.modal.active .modal-content{
    transform:scale(1);
}

.modal img{
    max-width:320px;
    width:100%;
    height:auto;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.8);
}

/* tiny screens extra safety */
@media(max-width:380px){
    .name{
        font-size:1.9rem;
    }
    .tag-brackets{
        font-size:1.6rem;
    }
    .hobby-item{
        padding:6px 12px;
        font-size:0.8rem;
    }
    .spotify-player{
        gap:10px;
    }
    .spotify-controls{
        gap:12px;
    }
    .glass-btn{
        padding:14px 16px;
        font-size:1.2rem;
    }
}
</style>
</head>
<body>

<div class="card">
<div class="portfolio">

<div class="image-zone">
<div class="image-frame">
<img src="https://cftc-15g.pages.dev/1772358401930_file_1772358401930.jpg" alt="Dipuu profile">
</div>
</div>

<div class="content-zone">

<div class="name-badge">
<span class="name">Dipuu</span>
<span class="tag-brackets">&lt;/&gt;</span>
</div>

<div class="hobby-section">
<div class="hobby-title">// passions & crafts</div>
<div class="hobby-grid">
<a href="social.html"><div class="hobby-item"><i class="fas fa-hashtag"></i> Social Media Handler</div></a>
<a href="telebot.html"><div class="hobby-item"><i class="fas fa-robot"></i> TeleBot Dev</div></a>
</div>
</div>

<!-- SPOTIFY UI -->
<div class="spotify-player">
    <div class="spotify-cover">
        <img src="https://cftc-15g.pages.dev/1772509714042_file_1772509714042.jpg" alt="her jvke cover">
    </div>
    <div class="spotify-track-info">
        <div class="spotify-song-name">her</div>
        <div class="spotify-artist">JVKE</div>
        <div class="spotify-progress">
            <div class="spotify-progress-fill"></div>
        </div>
    </div>
    <div class="spotify-controls">
        <i class="fas fa-heart" style="color:#1db954;" id="heartIcon"></i>
        <i class="fas fa-step-backward" id="backwardBtn"></i>
        <div class="spotify-play-btn" id="playPauseBtn" onclick="togglePlay()">
            <i class="fas fa-play" id="playPauseIcon"></i>
        </div>
        <i class="fas fa-step-forward" id="forwardBtn"></i>
    </div>
</div>

<!-- Audio element with improved autoplay attributes -->
<audio id="spotifyAudio" preload="auto" loop autoplay playsinline>
    <source src="https://raw.githubusercontent.com/rockbkl/testing/main/audio_8517810467.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<!-- Contact button -->
<a href="https://t.me/dipuux" class="glass-btn" target="_blank">
<i class="fab fa-telegram-plane"></i>
Contact Telegram
</a>

<div class="glass-btn" onclick="openModal()">
💸 Support / Donate
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="donationModal" onclick="closeModal()">
<div class="modal-content">
<img src="https://cftc-15g.pages.dev/1772508139663_file_1772508139663.jpg" alt="Donation QR">
</div>
</div>

<script>
function openModal(){
    document.getElementById("donationModal").classList.add("active");
}

function closeModal(){
    document.getElementById("donationModal").classList.remove("active");
}

// Audio control with aggressive autoplay handling
const audio = document.getElementById('spotifyAudio');
const playPauseIcon = document.getElementById('playPauseIcon');
const heartIcon = document.getElementById('heartIcon');
const backwardBtn = document.getElementById('backwardBtn');
const forwardBtn = document.getElementById('forwardBtn');

// Comprehensive autoplay function
function attemptAutoplay() {
    // Set volume (0.7 for good level but not too loud)
    audio.volume = 0.7;
    
    // Try to play with promise handling
    const playPromise = audio.play();
    
    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                // Autoplay succeeded!
                playPauseIcon.classList.remove('fa-play');
                playPauseIcon.classList.add('fa-pause');
                console.log('✅ Autoplay successful');
            })
            .catch(error => {
                // Autoplay was prevented
                console.log('❌ Autoplay blocked:', error);
                
                // For mobile devices, we can try one more trick: 
                // wait for a user interaction (but we don't want to force)
                // Instead, we'll just show the play button and user can click
                playPauseIcon.classList.remove('fa-pause');
                playPauseIcon.classList.add('fa-play');
                
                // On iOS, we need a user gesture. Let's add a one-time listener
                // that tries to play on first touch/click anywhere
                const playOnFirstInteraction = function() {
                    audio.play().then(() => {
                        playPauseIcon.classList.remove('fa-play');
                        playPauseIcon.classList.add('fa-pause');
                        document.removeEventListener('touchstart', playOnFirstInteraction);
                        document.removeEventListener('click', playOnFirstInteraction);
                    }).catch(e => {});
                };
                
                document.addEventListener('touchstart', playOnFirstInteraction, { once: true });
                document.addEventListener('click', playOnFirstInteraction, { once: true });
            });
    }
}

// Try autoplay from multiple events to increase chances
window.addEventListener('load', function() {
    // Immediate attempt
    attemptAutoplay();
});

// Also try after a short delay (helps some browsers)
setTimeout(attemptAutoplay, 500);
setTimeout(attemptAutoplay, 1000);

// When page becomes visible again (user switches tabs back)
document.addEventListener('visibilitychange', function() {
    if (!document.hidden && audio.paused) {
        attemptAutoplay();
    }
});

function togglePlay() {
    if (audio.paused) {
        audio.play().then(() => {
            playPauseIcon.classList.remove('fa-play');
            playPauseIcon.classList.add('fa-pause');
        }).catch(e => console.log('play error:', e));
    } else {
        audio.pause();
        playPauseIcon.classList.remove('fa-pause');
        playPauseIcon.classList.add('fa-play');
    }
}

// Update icon when audio ends
audio.addEventListener('ended', function() {
    playPauseIcon.classList.remove('fa-pause');
    playPauseIcon.classList.add('fa-play');
    audio.currentTime = 0;
});

// Backward / forward (skip 5 seconds)
backwardBtn.addEventListener('click', function() {
    audio.currentTime = Math.max(0, audio.currentTime - 5);
});

forwardBtn.addEventListener('click', function() {
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
});

// Heart toggle (like)
heartIcon.addEventListener('click', function(e) {
    e.stopPropagation();
    this.style.color = this.style.color === 'rgb(29, 185, 84)' ? '#b3b3b3' : '#1db954';
});
</script>

</body>
</html>
