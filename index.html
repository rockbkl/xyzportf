<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dipuu <> | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(145deg,#0b0d10,#1a1e26);
    font-family:'Segoe UI',Roboto,system-ui;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    transition:0.3s ease;
}

/* Blur effect when modal open */
body.blur{
    filter:blur(4px);
}

/* CARD */
.card{
    max-width:1000px;
    width:100%;
    background:rgba(20,24,30,0.9);
    backdrop-filter:blur(12px);
    border:1px solid rgba(90,140,255,0.25);
    border-radius:48px 48px 40px 40px;
    box-shadow:0 25px 45px -12px rgba(0,0,0,0.85);
    overflow:hidden;
    animation:fadeUp 0.8s ease forwards;
    opacity:0;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(40px);}
    to{opacity:1;transform:translateY(0);}
}

.portfolio{
    display:flex;
    flex-direction:column;
}

@media(min-width:720px){
    .portfolio{
        flex-direction:row;
    }
}

.image-zone{
    flex:1.1;
    background:#0f1217;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
    border-bottom:2px solid #2a3140;
}

@media(min-width:720px){
    .image-zone{
        border-bottom:none;
        border-right:2px solid #2a3140;
    }
}

.image-frame{
    width:100%;
    max-width:360px;
    border-radius:32px;
    overflow:hidden;
    box-shadow:0 18px 30px -8px #00000080;
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.image-frame img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
}

.content-zone{
    flex:1.3;
    padding:32px;
    color:#edf2f9;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.name-badge{
    display:flex;
    align-items:baseline;
    gap:6px;
    margin-bottom:20px;
}

.name{
    font-size:2.7rem;
    font-weight:800;
    background:linear-gradient(130deg,#ffffff,#bdd3ff);
    -webkit-background-clip:text;
    color:transparent;
}

.tag-brackets{
    font-size:2rem;
    color:#6c8cbf;
}

.hobby-section{
    margin:24px 0;
}

.hobby-title{
    font-size:0.85rem;
    letter-spacing:2px;
    color:#8196b9;
    margin-bottom:16px;
    border-left:5px solid #3f7de0;
    padding-left:14px;
    text-transform:uppercase;
}

.hobby-grid{
    display:flex;
    flex-wrap:wrap;
    gap:14px 18px;
}

.hobby-grid a{
    text-decoration:none;
    color:inherit;
}

.hobby-item{
    background:#1e2636;
    border-radius:60px;
    padding:10px 20px;
    border:1px solid #334153;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:1rem;
    transition:0.3s ease;
    cursor:pointer;
}

.hobby-item:hover{
    background:#26334b;
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 0 15px rgba(96,160,255,0.4);
}

/* Glass Button */
.glass-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    width:100%;
    padding:20px 30px;
    font-size:1.5rem;
    font-weight:700;
    color:white;
    border-radius:100px;
    text-decoration:none;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px) saturate(180%);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 10px 30px rgba(0,0,0,0.6),
               inset 0 1px 1px rgba(255,255,255,0.2);
    transition:all 0.3s ease;
    margin-top:15px;
    cursor:pointer;
}

.glass-btn:hover{
    transform:translateY(-4px) scale(1.03);
    box-shadow:0 0 20px rgba(96,160,255,0.5);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition:0.3s ease;
}

.modal.active{
    opacity:1;
    visibility:visible;
}

.modal-content{
    transform:scale(0.7);
    transition:0.3s ease;
}

.modal.active .modal-content{
    transform:scale(1);
}

.modal img{
    max-width:320px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.8);
}

/* ---------- SPOTIFY UI (AUTOPLAY) - SEPARATE BOX ABOVE CONTACT ---------- */
.spotify-player {
    margin-top: 20px;
    margin-bottom: 10px;  /* space before contact button */
    background: rgba(0, 0, 0, 0.5);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(29, 185, 84, 0.2);
    transition: 0.2s;
}

.spotify-player:hover {
    background: rgba(25, 35, 50, 0.8);
    border-color: #1db954;
    box-shadow: 0 18px 30px -8px #1db95420;
}

.spotify-cover {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 8px 15px rgba(0,0,0,0.6);
}

.spotify-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.spotify-track-info {
    flex: 1;
    min-width: 0;
}

.spotify-song-name {
    font-weight: 700;
    font-size: 1.2rem;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}

.spotify-artist {
    font-size: 0.85rem;
    color: #b3b3b3;
    letter-spacing: 0.3px;
}

.spotify-controls {
    display: flex;
    align-items: center;
    gap: 20px;
}

.spotify-controls i {
    color: #b3b3b3;
    font-size: 1.4rem;
    cursor: pointer;
    transition: 0.15s;
}

.spotify-controls i:hover {
    color: white;
    transform: scale(1.05);
}

.spotify-play-btn {
    background: #1db954;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: black !important;
    font-size: 1.2rem !important;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}

.spotify-play-btn:hover {
    background: #1ed760;
    transform: scale(1.08);
    color: black !important;
}

.spotify-play-btn i {
    color: black;
    font-size: 1.2rem;
}

.spotify-play-btn i:hover {
    color: black;
}

/* small progress bar (visual only) */
.spotify-progress {
    margin-top: 8px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    width: 100%;
    position: relative;
}

.spotify-progress-fill {
    width: 45%;
    height: 100%;
    background: #1db954;
    border-radius: 4px;
}

</style>
</head>
<body>

<div class="card">
<div class="portfolio">

<div class="image-zone">
<div class="image-frame">
<img src="https://cftc-15g.pages.dev/1772358401930_file_1772358401930.jpg" alt="Dipuu profile">
</div>
</div>

<div class="content-zone">

<div class="name-badge">
<span class="name">Dipuu</span>
<span class="tag-brackets">&lt;/&gt;</span>
</div>

<div class="hobby-section">
<div class="hobby-title">// passions & crafts</div>
<div class="hobby-grid">

<a href="social.html"><div class="hobby-item"><i class="fas fa-hashtag"></i> Social Media Handler</div></a>
<a href="telebot.html"><div class="hobby-item"><i class="fas fa-robot"></i> TeleBot Dev</div></a>
</div>
</div>

<!-- SPOTIFY UI – SEPARATE BOX (placed above contact, visually distinct) -->
<div class="spotify-player">
    <div class="spotify-cover">
        <img src="https://cftc-15g.pages.dev/1772509714042_file_1772509714042.jpg" alt="her jvke cover">
    </div>
    <div class="spotify-track-info">
        <div class="spotify-song-name">her</div>
        <div class="spotify-artist">JVKE</div>
        <!-- tiny decorative progress bar -->
        <div class="spotify-progress">
            <div class="spotify-progress-fill"></div>
        </div>
    </div>
    <div class="spotify-controls">
        <i class="fas fa-heart" style="color:#1db954;" id="heartIcon"></i>
        <i class="fas fa-step-backward" id="backwardBtn"></i>
        <!-- play/pause button -->
        <div class="spotify-play-btn" id="playPauseBtn" onclick="togglePlay()">
            <i class="fas fa-play" id="playPauseIcon"></i>
        </div>
        <i class="fas fa-step-forward" id="forwardBtn"></i>
    </div>
</div>

<!-- 
    FIXED AUDIO SOURCE: 
    Using the raw GitHub URL (direct download link) for the mp3 file.
    This should now be a playable audio stream.
-->
<audio id="spotifyAudio" style="display:none;" preload="auto" loop>
    <source src="https://raw.githubusercontent.com/rockbkl/testing/main/audio_8517810467.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<!-- Contact button (now directly below the separate Spotify box) -->
<a href="https://t.me/dipuux" class="glass-btn" target="_blank">
<i class="fab fa-telegram-plane"></i>
Contact Telegram
</a>

<div class="glass-btn" onclick="openModal()">
💸 Support / Donate
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="donationModal" onclick="closeModal()">
<div class="modal-content">
<img src="https://cftc-15g.pages.dev/1772508139663_file_1772508139663.jpg" alt="Donation QR">
</div>
</div>

<script>
// modal functions
function openModal(){
    document.getElementById("donationModal").classList.add("active");
}

function closeModal(){
    document.getElementById("donationModal").classList.remove("active");
}

// ---------- SPOTIFY AUDIO CONTROL ----------
const audio = document.getElementById('spotifyAudio');
const playPauseBtn = document.getElementById('playPauseBtn');
const playPauseIcon = document.getElementById('playPauseIcon');
const heartIcon = document.getElementById('heartIcon');
const backwardBtn = document.getElementById('backwardBtn');
const forwardBtn = document.getElementById('forwardBtn');

// Attempt autoplay on page load
window.addEventListener('load', function() {
    // Set a small delay to ensure metadata is loaded
    setTimeout(() => {
        let playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                playPauseIcon.classList.remove('fa-play');
                playPauseIcon.classList.add('fa-pause');
                console.log('Autoplay started successfully');
            }).catch((error) => {
                // autoplay blocked — do nothing, user must click play
                console.log('Autoplay blocked by browser. Click play.', error);
                // Optionally show a message, but we keep it quiet
            });
        }
    }, 300);
});

function togglePlay() {
    if (audio.paused) {
        audio.play().then(() => {
            playPauseIcon.classList.remove('fa-play');
            playPauseIcon.classList.add('fa-pause');
        }).catch(e => console.log('play error:', e));
    } else {
        audio.pause();
        playPauseIcon.classList.remove('fa-pause');
        playPauseIcon.classList.add('fa-play');
    }
}

// Update icon when audio ends
audio.addEventListener('ended', function() {
    playPauseIcon.classList.remove('fa-pause');
    playPauseIcon.classList.add('fa-play');
    audio.currentTime = 0;
});

// Backward / forward (skip 5 seconds)
backwardBtn.addEventListener('click', function() {
    audio.currentTime = Math.max(0, audio.currentTime - 5);
});

forwardBtn.addEventListener('click', function() {
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
});

// Heart toggle (like)
heartIcon.addEventListener('click', function(e) {
    e.stopPropagation();
    this.style.color = this.style.color === 'rgb(29, 185, 84)' ? '#b3b3b3' : '#1db954';
});

</script>

</body>
</html>
